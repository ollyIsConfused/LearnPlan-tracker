server {
    listen 80;
    listen [::]:80;
    server_name lernplan.example.com;

    location = /lernen/hebendanz {
        return 301 /lernen/hebendanz/;
    }

    location /lernen/hebendanz/assets/ {
        alias /var/www/learnplan-tracker/dist/assets/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /lernen/hebendanz/ {
        alias /var/www/learnplan-tracker/dist/;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
