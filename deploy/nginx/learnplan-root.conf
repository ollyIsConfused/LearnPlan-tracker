server {
    listen 80;
    listen [::]:80;
    server_name lernplan.example.com;

    root /var/www/learnplan-tracker/dist;
    index index.html;

    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
